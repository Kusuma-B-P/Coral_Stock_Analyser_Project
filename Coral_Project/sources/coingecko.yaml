name: coingecko
version: 0.1.0
dsl_version: 3
backend: http
base_url: "https://api.coingecko.com/api/v3"
tables:
  - name: markets
    description: "Live crypto market data. Filter by coin IDs (e.g. bitcoin, ethereum, solana)."
    filters:
      - name: ids
        type: Utf8
        required: false
        description: "Comma-separated coin IDs e.g. bitcoin,ethereum,solana"
      - name: vs_currency
        type: Utf8
        required: false
        description: "Currency to compare against, default usd"
    request:
      method: GET
      path: /coins/markets
      query:
        - name: vs_currency
          from: filter
          key: vs_currency
          default: "usd"
        - name: ids
          from: filter
          key: ids
        - name: order
          from: literal
          value: "market_cap_desc"
        - name: per_page
          from: literal
          value: "50"
        - name: page
          from: literal
          value: "1"
    response:
      rows_path: []
    columns:
      - name: id
        type: Utf8
      - name: symbol
        type: Utf8
      - name: name
        type: Utf8
      - name: current_price
        type: Float64
      - name: market_cap
        type: Float64
      - name: market_cap_rank
        type: Int64
      - name: total_volume
        type: Float64
      - name: high_24h
        type: Float64
      - name: low_24h
        type: Float64
      - name: price_change_24h
        type: Float64
      - name: price_change_percentage_24h
        type: Float64
      - name: circulating_supply
        type: Float64
      - name: total_supply
        type: Float64
      - name: max_supply
        type: Float64
      - name: ath
        type: Float64
      - name: ath_change_percentage
        type: Float64
      - name: last_updated
        type: Utf8
